<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Trắc Nghiệm - Vòng Quay May Mắn</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            color: #0056b3;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        /* Màn hình Wheel */
        #wheel-timer { font-size: 40px; font-weight: bold; color: #dc3545; margin: 20px 0; }
        #selected-student { font-size: 35px; font-weight: bold; color: #28a745; margin: 20px 0; min-height: 50px; }
        
        /* Màn hình Câu hỏi */
        #question-timer { font-size: 30px; font-weight: bold; color: #dc3545; }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .option-btn {
            font-size: 18px;
            padding: 15px;
            background-color: #e9ecef;
            color: #333;
            border: 2px solid #ced4da;
            text-align: left;
            line-height: 1.5;
        }
        .option-btn:hover:not(:disabled) { background-color: #d3d9df; }
        .correct { background-color: #28a745 !important; color: white !important; border-color: #28a745 !important; }
        .wrong { background-color: #dc3545 !important; color: white !important; border-color: #dc3545 !important; }
        
        #explanation {
            margin-top: 25px;
            padding: 20px;
            background-color: #d4edda;
            border-left: 5px solid #28a745;
            text-align: left;
            display: none;
            font-size: 18px;
        }

        /* Màn hình Quà */
        .gifts-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .gift-box {
            width: 100px;
            height: 100px;
            background-color: #ffc107;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .gift-box:hover { transform: scale(1.1); }
        .gift-box.opened { background-color: #17a2b8; font-size: 16px; font-weight: bold; color: white; cursor: default; transform: none; padding: 10px; text-align: center;}
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-wheel">
        <h1>🎡 Vòng Quay Gọi Tên 🎡</h1>
        <div id="wheel-timer">15</div>
        <div id="selected-student">...</div>
        <button id="btn-spin" onclick="startWheel()">Quay Chọn Học Sinh</button>
        <button id="btn-start-q" class="hidden" onclick="showQuestionScreen()">Bắt Đầu Trả Lời</button>
    </div>

    <div id="screen-question" class="hidden">
        <h2>Học sinh: <span id="current-student-name" style="color:#007bff;"></span></h2>
        <div id="question-timer">60</div>
        <div id="question-text" style="font-size: 20px; text-align: left; margin: 20px 0;"></div>
        
        <div class="options-grid" id="options-container"></div>

        <div id="explanation">
            <strong>Hướng dẫn giải:</strong><br>
            <span id="explanation-text"></span>
        </div>
        
        <br>
        <button id="btn-to-gifts" class="hidden" onclick="showGiftScreen()">🎁 Nhận Quà 🎁</button>
    </div>

    <div id="screen-gifts" class="hidden">
        <h2>Phần Thưởng Chúc Mừng!</h2>
        <p>Em hãy chọn 1 túi quà bí mật nhé:</p>
        <div class="gifts-container" id="gifts-container"></div>
        <br><br>
        <button id="btn-next-question" class="hidden" onclick="nextQuestion()">Câu Hỏi Tiếp Theo ➔</button>
    </div>
</div>

<script>
    // Danh sách 25 học sinh
    const students = [
        "Long", "Trần Đức", "Phú Đức", "Lành", "Trà My", "Bảo", "Ngọc Anh", "Pháp", 
        "Triết", "Huế", "Hưng", "Khánh", "Ngọc", "Bảo Thi", "Trâm", "Thanh Trường", 
        "Đài", "Huyền", "Nam", "Ly", "Ý", "Quang Trường", "Vân", "Kiều", "Anh Quân"
    ];

    const giftPool = ["1 tràng vỗ tay", "1 điểm tốt", "2 điểm tốt", "1 tràng vỗ tay", "Điểm 8"];

    const questions = [
        {
            text: "Câu 1. Trong không gian với hệ trục tọa độ \\(Oxyz\\), mặt cầu \\((S): (x+2)^2+(y-1)^2+z^2=4\\) có tâm và bán kính R lần lượt là:",
            options: ["A. \\(I(2;-1;0)\\), R=2.", "B. \\(I(2;-1;0)\\), R=4.", "C. \\(I(-2;1;0)\\), R=4.", "D. \\(I(-2;1;0)\\), R=2."],
            correctIndex: 3,
            explanation: "Phương trình mặt cầu có dạng \\((x-a)^2+(y-b)^2+(z-c)^2=R^2\\). Nhìn vào phương trình ta suy ra tâm \\(I(-2; 1; 0)\\) và bán kính \\(R = \\sqrt{4} = 2\\)."
        },
        {
            text: "Câu 2. Diện tích S của hình phẳng giới hạn bởi đồ thị hàm số \\(y=x^2\\), trục hoành Ox, các đường thẳng \\(x=1\\), \\(x=2\\) là:",
            options: ["A. S=8.", "B. \\(S=\\frac{8}{3}\\).", "C. S=7.", "D. \\(S=\\frac{7}{3}\\)."],
            correctIndex: 3,
            explanation: "Diện tích \\(S = \\int_{1}^{2} x^2 dx = \\frac{x^3}{3} \\Big|_1^2 = \\frac{8}{3} - \\frac{1}{3} = \\frac{7}{3}\\)."
        },
        {
            text: "Câu 3. Tích phân \\(I=\\int_{-1}^{1}(x^3+3x+2)dx\\) có giá trị là:",
            options: ["A. I=4.", "B. I=2.", "C. I=3.", "D. I=1."],
            correctIndex: 0,
            explanation: "\\(I = \\int_{-1}^{1}(x^3+3x)dx + \\int_{-1}^{1}2dx = 0 + 2x \\Big|_{-1}^1 = 4\\)."
        },
        {
            text: "Câu 4. Cho \\(\\int 5^x dx=F(x)+C\\). Khẳng định nào dưới đây đúng?",
            options: ["A. \\(F(x) = 5 \\ln 5\\).", "B. \\(F'(x)=-5^x\\).", "C. \\(F(x)=5^x\\).", "D. \\(F'(x)=5^x\\)."],
            correctIndex: 3,
            explanation: "Theo định nghĩa của nguyên hàm: Nếu \\(\\int f(x)dx = F(x) + C\\) thì \\(F'(x) = f(x)\\). Ở đây \\(f(x) = 5^x\\) nên \\(F'(x) = 5^x\\)."
        },
        {
            text: "Câu 5. Trong không gian với hệ tọa độ Oxyz, cho mặt phẳng \\((P):3x+2y-z+1=0\\). Mặt phẳng (P) có vectơ pháp tuyến là:",
            options: ["A. \\(\\vec{n}=(3;-1;2)\\).", "B. \\(\\vec{n}=(-1;3;2)\\).", "C. \\(\\vec{n}=(3;2;-1)\\).", "D. \\(\\vec{n}=(2;3;-1)\\)."],
            correctIndex: 2,
            explanation: "Vectơ pháp tuyến của mặt phẳng \\(Ax+By+Cz+D=0\\) là \\(\\vec{n}=(A; B; C)\\). Dễ dàng thấy \\(\\vec{n}=(3; 2; -1)\\)."
        },
        {
            text: "Câu 6. Họ nguyên hàm của hàm số \\(f(x)=3x^2+2x+5\\) là:",
            options: ["A. \\(x^3+x^2+5x+C\\).", "B. \\(x^3+x+C\\).", "C. \\(x^3+x^2+C\\).", "D. \\(x^3+x^2+5\\)."],
            correctIndex: 0,
            explanation: "\\(\\int(3x^2+2x+5)dx = x^3+x^2+5x+C\\)."
        },
        {
            text: "Câu 7. Trong không gian Oxyz, cho đường thẳng \\(d:\\begin{cases}x=0\\\\ y=t\\\\ z=2-t\\end{cases}\\). Vectơ nào dưới đây là vectơ chỉ phương của d?",
            options: ["A. \\(\\vec{u}=(1;0;-1)\\).", "B. \\(\\vec{u}=(0;1;-1)\\).", "C. \\(\\vec{u}=(0;0;2)\\).", "D. \\(\\vec{u}=(0;1;-2)\\)."],
            correctIndex: 1,
            explanation: "Dựa vào hệ số của t trong phương trình tham số, vectơ chỉ phương là \\(\\vec{u}=(0; 1; -1)\\)."
        },
        {
            text: "Câu 8. Nếu \\(\\int_{1}^{3}f(x)dx=2\\) thì giá trị của \\(\\int_{1}^{3}5f(x)dx\\) bằng: (Giả định đề gốc lỗi hiển thị)",
            options: ["A. 18.", "B. 10.", "C. 12.", "D. 20."],
            correctIndex: 1,
            explanation: "Áp dụng tính chất: \\(\\int k \\cdot f(x)dx = k \\int f(x)dx = 5 \\times 2 = 10\\)."
        },
        {
            text: "Câu 9. Trong không gian Oxyz, cho 2 đường thẳng \\(d_1:\\frac{x}{1}=\\frac{y+1}{-1}=\\frac{z-1}{2}\\) và \\(d_2:\\frac{x+1}{-1}=\\frac{y}{1}=\\frac{z-3}{1}\\). Góc giữa hai đường thẳng đó bằng:",
            options: ["A. \\(90^{\\circ}\\).", "B. \\(45^{\\circ}\\).", "C. \\(30^{\\circ}\\).", "D. \\(60^{\\circ}\\)."],
            correctIndex: 0,
            explanation: "\\(\\vec{u_1}=(1;-1;2)\\), \\(\\vec{u_2}=(-1;1;1)\\). Ta có \\(\\vec{u_1} \\cdot \\vec{u_2} = -1 - 1 + 2 = 0\\). Suy ra góc là \\(90^{\\circ}\\)."
        },
        {
            text: "Câu 10. Đường thẳng d đi qua \\(M(2;0;-1)\\) và có véc tơ chỉ phương \\(\\vec{a}=(2;-3;1)\\) có phương trình:",
            options: ["A. \\(\\begin{cases}x=4+2t\\\\ y=-3t\\\\ z=2+t\\end{cases}\\)", "B. \\(\\begin{cases}x=-2+2t\\\\ y=-3t\\\\ z=t\\end{cases}\\)", "C. \\(\\begin{cases}x=2+2t\\\\ y=-3t\\\\ z=-1+t\\end{cases}\\)", "D. \\(\\begin{cases}x=-2+4t\\\\ y=-6t\\\\ z=1+2t\\end{cases}\\)"],
            correctIndex: 2,
            explanation: "Phương trình tham số qua M(x0;y0;z0) có vtcp (a;b;c) là \\(x=x_0+at, y=y_0+bt, z=z_0+ct\\)."
        },
        {
            text: "Câu 11. Viết phương trình mặt phẳng đi qua ba điểm \\(A(1;1;4)\\), \\(B(2;7;9)\\), \\(C(0;9;13)\\).",
            options: ["A. \\(2x+y+z+1=0\\)", "B. \\(x-y+z-4=0\\)", "C. \\(2x+y-z-2=0\\)", "D. \\(7x-2y+z-9=0\\)"],
            correctIndex: 1,
            explanation: "\\(\\vec{AB}=(1;6;5)\\), \\(\\vec{AC}=(-1;8;9)\\). \\(\\vec{n}=[\\vec{AB},\\vec{AC}]=(14;-14;14)\\). Chọn \\(\\vec{n}=(1;-1;1)\\). Phương trình: \\(1(x-1)-1(y-1)+1(z-4)=0 \\Leftrightarrow x-y+z-4=0\\)."
        },
        {
            text: "Câu 12. Phương trình nào sau đây là phương trình tổng quát của một mặt phẳng?",
            options: ["A. \\(\\frac{1}{x}+\\frac{2}{y}+\\frac{3}{z}=1\\)", "B. \\(\\frac{x}{2}=\\frac{y-1}{4}=z\\)", "C. \\(x^2+y^2+z^2-1=0\\)", "D. \\(2x-3z+1=0\\)"],
            correctIndex: 3,
            explanation: "Phương trình tổng quát mặt phẳng có dạng bậc nhất \\(Ax+By+Cz+D=0\\)."
        },
        {
            text: "Câu 13. Tích phân \\(\\int_{0}^{3}e^x dx\\) có giá trị bằng:",
            options: ["A. \\(1-e^3\\).", "B. \\(e^3-1\\).", "C. \\(e^3+1\\).", "D. \\(\\frac{477}{25}\\)."],
            correctIndex: 1,
            explanation: "\\(\\int_{0}^{3}e^x dx = e^x \\Big|_0^3 = e^3 - e^0 = e^3 - 1\\)."
        },
        {
            text: "Câu 14. Họ các nguyên hàm của hàm số \\(f(x)=\\cos x-\\sin x\\) là:",
            options: ["A. \\(\\cos x-\\sin x+C\\)", "B. \\(\\sin x+\\cos x+C\\).", "C. \\(\\sin x-\\cos x+C\\).", "D. \\(\\sin 2x+C\\)."],
            correctIndex: 1,
            explanation: "\\(\\int(\\cos x - \\sin x)dx = \\sin x - (-\\cos x) + C = \\sin x + \\cos x + C\\)."
        },
        {
            text: "Câu 15. Nguyên hàm \\(F(x)\\) của hàm số \\(f(x)=3x^2+4x\\) thỏa mãn \\(F(1)=5\\) là:",
            options: ["A. \\(F(x)=9x^3+8x^2-12\\)", "B. \\(F(x)=x^3+2x^2+5\\).", "C. \\(F(x)=6x+4\\)", "D. \\(F(x)=x^3+2x^2+2\\)."],
            correctIndex: 3,
            explanation: "\\(F(x) = \\int(3x^2+4x)dx = x^3+2x^2+C\\). Thay \\(x=1\\): \\(1+2+C=5 \\Rightarrow C=2\\). Vậy \\(F(x)=x^3+2x^2+2\\)."
        },
        {
            text: "Câu 16. Cho mặt cầu \\((S):(x-1)^2+(y-2)^2+(z-3)^2=16\\). Bán kính của mặt cầu bằng:",
            options: ["A. 16.", "B. 2.", "C. 4.", "D. 8."],
            correctIndex: 2,
            explanation: "\\(R^2 = 16 \\Rightarrow R = 4\\)."
        },
        {
            text: "Câu 17. Tọa độ một vectơ chỉ phương của đường thẳng \\(d:\\frac{x-2}{-3}=\\frac{y+1}{1}=\\frac{z}{2}\\) là:",
            options: ["A. (2;-1;0).", "B. (-3;1;2).", "C. (-2;1;0).", "D. (3;1;-2)."],
            correctIndex: 1,
            explanation: "Vectơ chỉ phương nằm ở dưới mẫu của phương trình chính tắc: \\(\\vec{u}=(-3; 1; 2)\\)."
        },
        {
            text: "Câu 18. Thể tích khối tròn xoay sinh ra khi quay hình phẳng giới hạn bởi \\(y=5x-6x^2, y=0, x=0, x=1\\) quanh trục Ox là:",
            options: ["A. \\(\\frac{1}{2}\\)", "B. \\(\\frac{8}{15}\\)", "C. \\(\\frac{\\pi}{2}\\)", "D. \\(\\frac{8\\pi}{15}\\)"],
            correctIndex: 3,
            explanation: "\\(V = \\pi \\int_{0}^{1}(5x-6x^2)^2 dx = \\pi \\int_{0}^{1}(25x^2 - 60x^3 + 36x^4) dx = \\pi (\\frac{25}{3} - 15 + \\frac{36}{5}) = \\frac{8\\pi}{15}\\)."
        },
        {
            text: "Câu 19. Mặt cầu tâm \\(M(1;2;4)\\) tiếp xúc mặt phẳng \\(2x+y-2z+1=0\\) có bán kính bằng:",
            options: ["A. \\(\\frac{4}{3}\\)", "B. 1.", "C. \\(\\frac{3}{4}\\)", "D. 2."],
            correctIndex: 1,
            explanation: "Bán kính bằng khoảng cách từ M đến mặt phẳng: \\(R = d(M,(P)) = \\frac{|2(1)+2-2(4)+1|}{\\sqrt{2^2+1^2+(-2)^2}} = \\frac{|-3|}{3} = 1\\)."
        },
        {
            text: "Câu 20. Đường thẳng nào sau đây vuông góc với mặt phẳng (giả sử có véc tơ pháp tuyến \\(\\vec{n}=(1;2;-3)\\)):",
            options: ["A. \\(d:\\frac{x-2}{1}=\\frac{y-4}{2}=\\frac{z+4}{-3}\\)", "B. \\(d:\\frac{x-1}{1}=\\frac{y-2}{2}=\\frac{z+1}{3}\\)", "C. \\(d:\\frac{x-1}{1}=\\frac{y-2}{1}=\\frac{z+1}{-1}\\)", "D. \\(d:\\frac{x-1}{2}=\\frac{y-2}{3}=\\frac{z+1}{1}\\)"],
            correctIndex: 0,
            explanation: "Đường thẳng vuông góc với mặt phẳng thì vectơ chỉ phương của nó cùng phương với vectơ pháp tuyến của mặt phẳng."
        },
        {
            text: "Câu 21. Trong không gian Oxyz, mặt phẳng nào sau đây đi qua gốc tọa độ?",

            explanation: "Mặt phẳng đi qua gốc tọa độ O(0;0;0) khi thay x=0, y=0, z=0 vào phương trình ta được mệnh đề đúng (hệ số D = 0)."

        {

            correctIndex: 3,
            explanation: "Vectơ chỉ phương nằm ở dưới mẫu của phương trình chính tắc: \\(\\vec{u}=(3; -2; 4)\\)."
        },
        {
            text: "Câu 23. Họ nguyên hàm \\(\\int x^5 dx\\) bằng:",
            options: ["A. \\(\\frac{1}{6}x^6+C\\)", "B. \\(5x^5+C\\)", "C. \\(4x^3+C\\)", "D. \\(x^5+C\\)"],

        },
        {
            text: "Câu 24. Cosin của góc giữa hai mặt phẳng \\((P):x+2y-2z+1=0\\) và \\((Q):x+y+z-1=0\\) bằng:",

            correctIndex: 3,
            explanation: "\\(\\cos\\varphi = \\frac{|\\vec{n_1}\\cdot\\vec{n_2}|}{|\\vec{n_1}|\\cdot|\\vec{n_2}|} = \\frac{|1+2-2|}{\\sqrt{1^2+2^2+(-2)^2}\\sqrt{1^2+1^2+1^2}} = \\frac{1}{3\\sqrt{3}} = \\frac{\\sqrt{3}}{9}\\)."
        },
        {
            text: "Câu 25. Cho hình phẳng D giới hạn bởi \\(y=f(x)\\) liên tục, trục hoành, \\(x=a, x=b\\). Mệnh đề nào ĐÚNG (biết \\(f(x)\\) đổi dấu tại x=0 thuộc (a;b)):",
            options: ["A. \\(S_D=-\\int_{a}^{0}f(x)dx-\\int_{a}^{b}f(x)dx\\)", "B. \\(S_D=\\int_{a}^{0}f(x)dx+\\int_{0}^{b}f(x)dx\\)", "C. \\(S_D=\\int_{a}^{0}f(x)dx-\\int_{0}^{b}f(x)dx\\)", "D. \\(S_D=-\\int_{a}^{0}f(x)dx+\\int_{0}^{b}f(x)dx\\)"],

            explanation: "Dựa vào đồ thị đổi dấu, diện tích được chia làm các phần tương ứng với tích phân trị tuyệt đối. Nếu \\(f(x)\\le 0\\) trên (a;0) và \\(f(x)\\ge 0\\) trên (0;b) thì \\(S = -\\int_{a}^{0}f(x)dx+\\int_{0}^{b}f(x)dx\\)."
        },
        {
            text: "Câu 26. Cho \\(F(x)\\) là một nguyên hàm của \\(f(x)\\). Mệnh đề nào dưới đây sai?",
            options: ["A. \\(\\int f(x)dx=F(x)+C\\)", "B. \\(F(x)=f(x)\\)", "C. \\((\\int f(x)dx)'=f(x)\\)", "D. \\(F'(x)=f(x)\\)"],

            explanation: "Theo định nghĩa nguyên hàm, \\(F'(x) = f(x)\\), việc khẳng định \\(F(x) = f(x)\\) là sai."

    let currentQuestionIndex = 0;
    let wheelInterval;
    let questionInterval;
    let currentStudent = "";
    
    function startWheel() {
        document.getElementById('btn-spin').disabled = true;
        document.getElementById('btn-start-q').classList.add('hidden');
        let timeLeft = 15;
        const timerDisplay = document.getElementById('wheel-timer');
        const nameDisplay = document.getElementById('selected-student');
        
        wheelInterval = setInterval(() => {
            const randomName = students[Math.floor(Math.random() * students.length)];
            nameDisplay.innerText = randomName;
        }, 100);

        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(wheelInterval);
                clearInterval(countdown);
                currentStudent = students[Math.floor(Math.random() * students.length)];
                nameDisplay.innerText = "🎉 " + currentStudent + " 🎉";
                document.getElementById('btn-start-q').classList.remove('hidden');
                document.getElementById('current-student-name').innerText = currentStudent;
            }
        }, 1000);
    }

    function showQuestionScreen() {
        document.getElementById('screen-wheel').classList.add('hidden');
        document.getElementById('screen-question').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= questions.length) {
            alert("Đã hết câu hỏi ôn tập!");
            return;
        }

        const q = questions[currentQuestionIndex];
        document.getElementById('question-text').innerHTML = q.text;
        document.getElementById('explanation-text').innerHTML = q.explanation;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('btn-to-gifts').classList.add('hidden');
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = opt;
            btn.onclick = () => checkAnswer(btn, index);
            optionsContainer.appendChild(btn);
        });

        // Kích hoạt MathJax để hiển thị công thức Toán
        MathJax.typesetPromise();

        let timeLeft = 60;
        document.getElementById('question-timer').innerText = timeLeft;
        clearInterval(questionInterval);
        questionInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('question-timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(questionInterval);
                alert("Hết giờ suy nghĩ!");
                disableAllOptions();
            }
        }, 1000);
    }

    function checkAnswer(btn, selectedIndex) {
        const q = questions[currentQuestionIndex];
        if (selectedIndex === q.correctIndex) {
            clearInterval(questionInterval);
            btn.classList.add('correct');
            disableAllOptions();
            document.getElementById('explanation').style.display = 'block';
            document.getElementById('btn-to-gifts').classList.remove('hidden');
            MathJax.typesetPromise(); // Hiển thị lại công thức trong phần giải thích
        } else {
            btn.classList.add('wrong');
            btn.disabled = true; 
        }
    }

    function disableAllOptions() {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
    }

    function showGiftScreen() {
        document.getElementById('screen-question').classList.add('hidden');
        document.getElementById('screen-gifts').classList.remove('hidden');
        document.getElementById('btn-next-question').classList.add('hidden');
        
        const container = document.getElementById('gifts-container');
        container.innerHTML = '';
        
        let shuffledGifts = [...giftPool].sort(() => 0.5 - Math.random());
        
        for (let i = 0; i < 5; i++) {
            const box = document.createElement('div');
            box.className = 'gift-box';
            box.innerText = '🎁';
            box.onclick = () => openGift(box, shuffledGifts[i]);
            container.appendChild(box);
        }
    }

    function openGift(boxElement, giftText) {
        boxElement.classList.add('opened');
        boxElement.innerText = giftText;
        
        const boxes = document.querySelectorAll('.gift-box');
        boxes.forEach(b => b.onclick = null);
        
        document.getElementById('btn-next-question').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        document.getElementById('screen-gifts').classList.add('hidden');
        document.getElementById('screen-wheel').classList.remove('hidden');
        
        document.getElementById('btn-spin').disabled = false;
        document.getElementById('btn-start-q').classList.add('hidden');
        document.getElementById('selected-student').innerText = '...';
        document.getElementById('wheel-timer').innerText = '15';
    }
</script>

</body>
</html>
